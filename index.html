<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InmoGestión PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1e; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3) !important; transition: all 0.2s; }
  .nav-btn:hover { background: #1e3a5f !important; color: #93c5fd !important; }
  .btn-primary:hover { background: #1d4ed8 !important; }
  .foto-thumb:hover .foto-del { display: flex !important; }
  @media print { .no-print { display: none !important; } .print-only { display: block !important; } body > * { display: none !important; } .print-only { display: block !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;
const ESTADO_COLOR = { "Disponible": "#22c55e", "En negociación": "#f59e0b", "Reservado": "#3b82f6", "Vendido": "#8b5cf6", "Arrendado": "#06b6d4" };
const TIPOS_PROP = ["Casa", "Apartamento", "Local", "Oficina", "Terreno", "Bodega", "Finca"];
const ESTADOS_PROP = ["Disponible", "En negociación", "Reservado", "Vendido", "Arrendado"];
const TIPOS_CLI = ["Comprador", "Vendedor", "Arrendatario", "Arrendador", "Inversionista"];
const TIPOS_CITA = ["Visita", "Negociación", "Firma de contrato", "Seguimiento", "Avalúo"];
const PROP_INICIAL = [
  { id: 1, titulo: "Casa en Las Lomas", tipo: "Casa", operacion: "Venta", precio: 250000, estado: "Disponible", habitaciones: 4, banos: 3, m2: 180, parqueadero: 2, direccion: "Las Lomas #45, Zona Norte", clienteId: 1, descripcion: "Hermosa casa con jardín, cocina integral y acabados de lujo.", fotos: [], notas: [], ventas: [] },
  { id: 2, titulo: "Apto Centro Histórico", tipo: "Apartamento", operacion: "Arriendo", precio: 1200, estado: "En negociación", habitaciones: 2, banos: 1, m2: 75, parqueadero: 1, direccion: "Calle Real #12, Centro", clienteId: 2, descripcion: "Apartamento remodelado, vista al parque, zona segura.", fotos: [], notas: [], ventas: [] },
  { id: 3, titulo: "Local Comercial Norte", tipo: "Local", operacion: "Venta", precio: 180000, estado: "Vendido", habitaciones: 0, banos: 1, m2: 120, parqueadero: 3, direccion: "Av. Norte #88, Sector Comercial", clienteId: 3, descripcion: "Excelente ubicación comercial, alto flujo peatonal.", fotos: [], notas: [{ id: 1, texto: "Escritura firmada el 15/03", fecha: "2026-03-15" }], ventas: [] },
];
const CLI_INICIAL = [
  { id: 1, nombre: "Juan Pérez", telefono: "555-1234", email: "juan@email.com", tipo: "Comprador", presupuesto: 300000, interes: "Casa con jardín", estado: "Activo", notas: [] },
  { id: 2, nombre: "María López", telefono: "555-5678", email: "maria@email.com", tipo: "Arrendatario", presupuesto: 1500, interes: "Apartamento 2 hab.", estado: "Activo", notas: [] },
  { id: 3, nombre: "Carlos Ruiz", telefono: "555-9012", email: "carlos@email.com", tipo: "Vendedor", presupuesto: 0, interes: "Vender local comercial", estado: "Cerrado", notas: [] },
];
const CITAS_INICIAL = [
  { id: 1, propiedadId: 1, clienteId: 1, fecha: "2026-05-10", hora: "10:00", tipo: "Visita", estado: "Pendiente", notas: "Primera visita al inmueble" },
  { id: 2, propiedadId: 2, clienteId: 2, fecha: "2026-05-12", hora: "15:00", tipo: "Negociación", estado: "Confirmada", notas: "Revisar términos del contrato" },
];

function useLS(key, initial) {
  const [val, setVal] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; } });
  const set = useCallback(v => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key]);
  return [val, set];
}

function App() {
  const [props, setProps] = useLS("inmo_props", PROP_INICIAL);
  const [clientes, setClientes] = useLS("inmo_clientes", CLI_INICIAL);
  const [citas, setCitas] = useLS("inmo_citas", CITAS_INICIAL);
  const [vista, setVista] = useState("dashboard");
  const [notif, setNotif] = useState(null);
  const [modal, setModal] = useState(null);
  const [detalle, setDetalle] = useState(null);
  const [busqueda, setBusqueda] = useState("");
  const [filtroEstado, setFiltroEstado] = useState("Todos");
  const [lightbox, setLightbox] = useState(null);
  const [imprimiendo, setImprimiendo] = useState(null);

  const toast = (msg, tipo="ok") => { setNotif({msg,tipo}); setTimeout(()=>setNotif(null),3000); };
  const getProp = id => props.find(p=>p.id===id);
  const getCli = id => clientes.find(c=>c.id===id);

  const agregarFotos = (propId, archivos) => {
    const readers = Array.from(archivos).map(file => new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); }));
    Promise.all(readers).then(base64s => { setProps(prev => prev.map(p => p.id===propId ? {...p, fotos:[...(p.fotos||[]),...base64s]} : p)); toast(`${base64s.length} foto${base64s.length>1?"s":""} agregada${base64s.length>1?"s":""} ✓`); });
  };
  const eliminarFoto = (propId, idx) => { setProps(prev => prev.map(p => p.id===propId ? {...p, fotos:p.fotos.filter((_,i)=>i!==idx)} : p)); toast("Foto eliminada"); };

  const guardar = (tipo, data) => {
    if (tipo==="propiedad") { if(data.id) setProps(p=>p.map(x=>x.id===data.id?{...x,...data}:x)); else setProps(p=>[...p,{...data,id:Date.now(),notas:[],fotos:[],ventas:[]}]); toast("Propiedad guardada ✓"); }
    else if (tipo==="cliente") { if(data.id) setClientes(c=>c.map(x=>x.id===data.id?{...x,...data}:x)); else setClientes(c=>[...c,{...data,id:Date.now(),notas:[]}]); toast("Cliente guardado ✓"); }
    else if (tipo==="cita") { if(data.id) setCitas(c=>c.map(x=>x.id===data.id?data:x)); else setCitas(c=>[...c,{...data,id:Date.now()}]); toast("Cita guardada ✓"); }
    setModal(null);
  };
  const eliminar = (tipo, id) => {
    if(tipo==="propiedad") setProps(p=>p.filter(x=>x.id!==id));
    else if(tipo==="cliente") setClientes(c=>c.filter(x=>x.id!==id));
    else if(tipo==="cita") setCitas(c=>c.filter(x=>x.id!==id));
    toast("Eliminado ✓"); setDetalle(null);
  };
  const agregarNota = (tipo, id, texto) => {
    const nota = {id:Date.now(),texto,fecha:new Date().toISOString().split("T")[0]};
    if(tipo==="propiedad") setProps(p=>p.map(x=>x.id===id?{...x,notas:[...x.notas,nota]}:x));
    else setClientes(c=>c.map(x=>x.id===id?{...x,notas:[...x.notas,nota]}:x));
    toast("Nota agregada ✓");
  };

  const propsFiltradas = props.filter(p=>(filtroEstado==="Todos"||p.estado===filtroEstado)&&(p.titulo.toLowerCase().includes(busqueda.toLowerCase())||p.tipo.toLowerCase().includes(busqueda.toLowerCase())));
  const citasPendientes = citas.filter(c=>c.estado==="Pendiente").length;

  const nav = (id) => { setVista(id); setBusqueda(""); setDetalle(null); };

  return (
    <div style={S.app}>
      {notif && <div style={{...S.notif,background:notif.tipo==="err"?"#dc2626":"#16a34a"}}>{notif.msg}</div>}
      <div style={S.sidebar} className="no-print">
        <div style={S.logo}><div style={S.logoMark}>🏛</div><div><div style={S.logoName}>InmoGestión</div><div style={S.logoPro}>PRO · CRM Inmobiliario</div></div></div>
        <div style={S.navSection}><div style={S.navLabel}>PRINCIPAL</div>
          {[{id:"dashboard",icon:"⬡",label:"Dashboard"},{id:"propiedades",icon:"🏠",label:"Propiedades"},{id:"clientes",icon:"👥",label:"Clientes"},{id:"citas",icon:"📅",label:"Citas",badge:citasPendientes}].map(n=>(
            <button key={n.id} className="nav-btn" onClick={()=>nav(n.id)} style={{...S.navBtn,...(vista===n.id?S.navActive:{})}}><span style={S.navIcon}>{n.icon}</span>{n.label}{n.badge>0&&<span style={S.navBadge}>{n.badge}</span>}</button>
          ))}
        </div>
        <div style={S.navSection}><div style={S.navLabel}>ANÁLISIS</div>
          {[{id:"graficas",icon:"📊",label:"Gráficas"},{id:"reportes",icon:"📄",label:"Reportes"}].map(n=>(
            <button key={n.id} className="nav-btn" onClick={()=>nav(n.id)} style={{...S.navBtn,...(vista===n.id?S.navActive:{})}}><span style={S.navIcon}>{n.icon}</span>{n.label}</button>
          ))}
        </div>
        <div style={S.sideStats}><div style={S.sideStatItem}><span style={S.sideStatNum}>{props.length}</span><span style={S.sideStatLbl}>Propiedades</span></div><div style={S.sideStatDiv}/><div style={S.sideStatItem}><span style={S.sideStatNum}>{clientes.length}</span><span style={S.sideStatLbl}>Clientes</span></div></div>
      </div>

      <div style={S.main}>
        <div style={S.topbar} className="no-print">
          <div><div style={S.pageTitle}>{{dashboard:"Panel Principal",propiedades:"Propiedades",clientes:"Clientes",citas:"Agenda",graficas:"Gráficas",reportes:"Reportes"}[vista]}</div><div style={S.pageSub}>{new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div></div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            {["propiedades","clientes","citas"].includes(vista)&&!detalle&&<><input style={S.search} placeholder="🔍 Buscar..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}/><button className="btn-primary" style={S.btnPrimary} onClick={()=>setModal({tipo:vista==="propiedades"?"propiedad":vista==="clientes"?"cliente":"cita",data:null})}>+ Nuevo</button></>}
            {detalle&&<button style={S.btnBack} onClick={()=>setDetalle(null)}>← Volver</button>}
          </div>
        </div>

        <div style={S.content}>
          {vista==="dashboard"&&<Dashboard props={props} clientes={clientes} citas={citas} citasPendientes={citasPendientes} getProp={getProp} getCli={getCli} setVista={setVista} setDetalle={setDetalle} S={S}/>}
          {vista==="propiedades"&&!detalle&&<PropList props={propsFiltradas} filtroEstado={filtroEstado} setFiltroEstado={setFiltroEstado} setDetalle={setDetalle} setModal={setModal} S={S}/>}
          {vista==="propiedades"&&detalle?.tipo==="propiedad"&&(()=>{const p=getProp(detalle.id);if(!p)return null;return <DetalleProp p={p} cli={getCli(p.clienteId)} onEdit={()=>setModal({tipo:"propiedad",data:p})} onDelete={()=>eliminar("propiedad",p.id)} onAddNota={txt=>agregarNota("propiedad",p.id,txt)} onAddFotos={files=>agregarFotos(p.id,files)} onDeleteFoto={idx=>eliminarFoto(p.id,idx)} onLightbox={idx=>setLightbox({fotos:p.fotos,idx})} onPrint={()=>{setImprimiendo(p);setTimeout(()=>{window.print();setImprimiendo(null);},300);}} S={S}/>;})()}
          {vista==="clientes"&&!detalle&&<CliList clientes={clientes} busqueda={busqueda} setDetalle={setDetalle} setModal={setModal} S={S}/>}
          {vista==="clientes"&&detalle?.tipo==="cliente"&&(()=>{const c=getCli(detalle.id);if(!c)return null;return <DetalleCli c={c} propAsoc={props.filter(p=>p.clienteId===c.id)} onEdit={()=>setModal({tipo:"cliente",data:c})} onDelete={()=>eliminar("cliente",c.id)} onAddNota={txt=>agregarNota("cliente",c.id,txt)} onVerProp={id=>{setVista("propiedades");setDetalle({tipo:"propiedad",id});}} S={S}/>;})()}
          {vista==="citas"&&<CitasList citas={citas} getProp={getProp} getCli={getCli} setModal={setModal} eliminar={eliminar} S={S}/>}
          {vista==="graficas"&&<Graficas props={props} clientes={clientes} S={S}/>}
          {vista==="reportes"&&<Reportes props={props} getCli={getCli} setImprimiendo={setImprimiendo} S={S}/>}
        </div>
      </div>

      {modal&&<ModalForm modal={modal} props={props} clientes={clientes} onSave={guardar} onClose={()=>setModal(null)} S={S}/>}
      {lightbox&&<Lightbox fotos={lightbox.fotos} idx={lightbox.idx} onClose={()=>setLightbox(null)} onChange={idx=>setLightbox(l=>({...l,idx}))}/>}
      {imprimiendo&&<div style={{display:"none"}} className="print-only"><PrintFicha prop={imprimiendo} cliente={getCli(imprimiendo.clienteId)}/></div>}
    </div>
  );
}

function Dashboard({props,clientes,citas,citasPendientes,getProp,getCli,setVista,setDetalle,S}) {
  return <div style={{animation:"fadeIn .4s ease"}}>
    <div style={S.kpiGrid}>
      {[{label:"Propiedades",val:props.length,sub:`${props.filter(p=>p.estado==="Disponible").length} disponibles`,icon:"🏠",color:"#3b82f6"},{label:"Clientes activos",val:clientes.filter(c=>c.estado==="Activo").length,sub:`${clientes.length} total`,icon:"👥",color:"#22c55e"},{label:"Citas pendientes",val:citasPendientes,sub:`${citas.length} agendadas`,icon:"📅",color:"#f59e0b"},{label:"Con fotos",val:props.filter(p=>p.fotos?.length>0).length,sub:"inmuebles fotografiados",icon:"📸",color:"#a855f7"}].map((k,i)=>(
        <div key={i} className="card-hover" style={{...S.kpi,borderTop:`3px solid ${k.color}`}}><div style={{fontSize:32}}>{k.icon}</div><div style={{...S.kpiVal,color:k.color}}>{k.val}</div><div style={S.kpiLabel}>{k.label}</div><div style={S.kpiSub}>{k.sub}</div></div>
      ))}
    </div>
    <div style={S.dashRow}>
      <div style={S.dashCard}>
        <div style={S.cardHead}><span style={S.cardTitle}>🏠 Propiedades Recientes</span><button style={S.linkBtn} onClick={()=>setVista("propiedades")}>Ver todas →</button></div>
        {props.slice(0,4).map(p=>(
          <div key={p.id} style={S.listRow} onClick={()=>{setVista("propiedades");setDetalle({tipo:"propiedad",id:p.id});}}>
            <div style={{width:48,height:48,borderRadius:10,overflow:"hidden",background:"#0f172a",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{p.fotos?.length>0?<img src={p.fotos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:22}}>🏠</span>}</div>
            <div style={{flex:1}}><div style={S.listTitle}>{p.titulo}</div><div style={S.listSub}>{p.tipo} · {p.m2}m²</div></div>
            <div style={{textAlign:"right"}}><div style={{...S.pill,background:ESTADO_COLOR[p.estado]+"25",color:ESTADO_COLOR[p.estado]}}>{p.estado}</div><div style={S.precio}>${Number(p.precio).toLocaleString()}</div></div>
          </div>
        ))}
        {props.length===0&&<div style={{color:"#475569",fontSize:13}}>Sin propiedades aún.</div>}
      </div>
      <div style={S.dashCard}>
        <div style={S.cardHead}><span style={S.cardTitle}>📅 Próximas Citas</span><button style={S.linkBtn} onClick={()=>setVista("citas")}>Ver agenda →</button></div>
        {citas.map(c=>{const p=getProp(c.propiedadId);const cl=getCli(c.clienteId);return(
          <div key={c.id} style={S.listRow}>
            <div style={S.fechaBadge}><div style={S.fechaDia}>{c.fecha.split("-")[2]}</div><div style={S.fechaMes}>{["","En","Fe","Ma","Ab","My","Jn","Jl","Ag","Se","Oc","No","Di"][+c.fecha.split("-")[1]]}</div></div>
            <div style={{flex:1}}><div style={S.listTitle}>{p?.titulo||"—"}</div><div style={S.listSub}>{cl?.nombre} · {c.hora}</div></div>
            <div style={{...S.pill,background:c.estado==="Confirmada"?"#22c55e25":"#f59e0b25",color:c.estado==="Confirmada"?"#22c55e":"#f59e0b"}}>{c.estado}</div>
          </div>
        );})}
        {citas.length===0&&<div style={{color:"#475569",fontSize:13}}>Sin citas agendadas.</div>}
      </div>
    </div>
    <div style={S.dashCard}><div style={S.cardTitle}>📊 Estado del Portafolio</div><div style={{display:"flex",gap:16,marginTop:16,flexWrap:"wrap"}}>{ESTADOS_PROP.map(est=>{const cnt=props.filter(p=>p.estado===est).length;const pct=props.length?Math.round(cnt/props.length*100):0;return(<div key={est} style={{flex:1,minWidth:100}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#94a3b8",marginBottom:6}}><span>{est}</span><span style={{color:ESTADO_COLOR[est],fontWeight:700}}>{cnt}</span></div><div style={{height:8,background:"#1e293b",borderRadius:4}}><div style={{height:"100%",width:`${pct}%`,background:ESTADO_COLOR[est],borderRadius:4,transition:"width .8s"}}/></div></div>);})}</div></div>
  </div>;
}

function PropList({props,filtroEstado,setFiltroEstado,setDetalle,setModal,S}) {
  return <div style={{animation:"fadeIn .3s ease"}}>
    <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>{["Todos",...ESTADOS_PROP].map(e=>(<button key={e} onClick={()=>setFiltroEstado(e)} style={{...S.filterBtn,...(filtroEstado===e?{background:ESTADO_COLOR[e]||"#3b82f6",color:"#fff",border:"none"}:{})}}>{e}</button>))}</div>
    <div style={S.propGrid}>
      {props.map(p=>(
        <div key={p.id} className="card-hover" style={S.propCard} onClick={()=>setDetalle({tipo:"propiedad",id:p.id})}>
          <div style={{...S.propBanner,background:"linear-gradient(135deg,#0f2744,#1a3d6e)",position:"relative",overflow:"hidden"}}>
            {p.fotos?.length>0?<img src={p.fotos[0]} alt={p.titulo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:"#334155"}}><span style={{fontSize:52}}>🏠</span><span style={{fontSize:11}}>Sin fotos</span></div>}
            <div style={{...S.propEstado,background:ESTADO_COLOR[p.estado]}}>{p.estado}</div>
            <div style={{...S.propOp,background:p.operacion==="Venta"?"#3b82f6":"#06b6d4"}}>{p.operacion}</div>
            {p.fotos?.length>0&&<div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#fff"}}>📸 {p.fotos.length}</div>}
          </div>
          <div style={S.propBody}><div style={S.propTit}>{p.titulo}</div><div style={S.propAddr}>📍 {p.direccion}</div><div style={S.propTags}><span style={S.tag}>🏗 {p.tipo}</span><span style={S.tag}>📐 {p.m2}m²</span>{p.habitaciones>0&&<span style={S.tag}>🛏 {p.habitaciones}</span>}{p.banos>0&&<span style={S.tag}>🚿 {p.banos}</span>}</div><div style={S.propBottom}><span style={S.propPrecio}>${Number(p.precio).toLocaleString()}{p.operacion==="Arriendo"&&<span style={{fontSize:12,color:"#64748b"}}>/mes</span>}</span><span style={S.viewBtn}>Ver →</span></div></div>
        </div>
      ))}
      <div className="card-hover" style={{...S.propCard,border:"2px dashed #1e3a5f",background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",minHeight:280}} onClick={()=>setModal({tipo:"propiedad",data:null})}><div style={{textAlign:"center",color:"#334155"}}><div style={{fontSize:40}}>+</div><div style={{marginTop:8,fontWeight:600}}>Agregar propiedad</div></div></div>
    </div>
  </div>;
}

function DetalleProp({p,cli,onEdit,onDelete,onAddNota,onAddFotos,onDeleteFoto,onLightbox,onPrint,S}) {
  const [dragOver,setDragOver]=useState(false);
  const inputRef=useRef();
  return <div style={{animation:"fadeIn .3s ease"}}><div style={S.detalleGrid}>
    <div>
      <div style={{...S.dashCard,padding:0,overflow:"hidden"}}>
        <div style={{height:220,background:"#0f172a",position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {p.fotos?.length>0?<img src={p.fotos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in"}} onClick={()=>onLightbox(0)}/>:<div style={{textAlign:"center",color:"#334155"}}><div style={{fontSize:64}}>🏠</div><div style={{fontSize:13,marginTop:8}}>Sin fotos aún</div></div>}
          <div style={{position:"absolute",top:10,right:10}}><div style={{...S.pill,background:ESTADO_COLOR[p.estado],color:"#fff"}}>{p.estado}</div></div>
        </div>
        <div style={{padding:"14px 16px"}}>
          <div style={{fontWeight:700,color:"#e2e8f0",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>📸 Galería ({p.fotos?.length||0} fotos)</span><button style={{...S.btnSm,fontSize:11}} onClick={()=>inputRef.current?.click()}>+ Agregar</button></div>
